name: Build and deploy TCG Radar

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'   # ogni 30 min: rigenera i dati e ripubblica (free tier puo' ritardare)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: pip install requests

      # Conserva lo storico prezzi tra un run e l'altro: cosi' i grafici crescono nel tempo.
      - name: Restore price history
        uses: actions/cache@v4
        with:
          path: |
            pipeline/history.json
            pipeline/translations.json
          key: tcg-history-${{ github.run_id }}
          restore-keys: |
            tcg-history-

      - name: Generate data.json (pipeline)
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: |
          cd pipeline
          python build_data.py
          cp data.json ../sample.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install app deps
        run: npm ci
      - name: Export web app
        run: npx expo export --platform web

      - name: Copy data.json into site
        run: cp pipeline/data.json dist/data.json

      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
